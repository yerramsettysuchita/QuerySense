version: "3.9"

# Development overlay — hot reload + direct port access
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  frontend:
    ports:
      - "3000:3000"
