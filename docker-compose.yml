version: "3.9"

services:
  main_db:
    image: postgres:15-alpine
    container_name: qs_main_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: querysense_main
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - main_db_data:/var/lib/postgresql/data
      - ./docker/init_main.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c pg_stat_statements.max=10000
        -c log_min_duration_statement=100
        -c track_activity_query_size=2048
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  shadow_db:
    image: postgres:15-alpine
    container_name: qs_shadow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: querysense_shadow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - shadow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mysql_db:
    image: mysql:8.0
    container_name: qs_mysql_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: querysense_main
      MYSQL_USER: querysense
      MYSQL_PASSWORD: querysense
    ports:
      - "3306:3306"
    volumes:
      - mysql_db_data:/var/lib/mysql
      - ./docker/init_mysql.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      --slow_query_log=ON
      --long_query_time=0.5
      --slow_query_log_file=/var/log/mysql/slow.log
      --log_output=TABLE
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmysql"]
      interval: 5s
      timeout: 5s
      retries: 10

  app_db:
    image: postgres:15-alpine
    container_name: qs_app_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: querysense_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - app_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qs_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qs_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MAIN_DB_URL=postgresql://postgres:postgres@main_db:5432/querysense_main
      - SHADOW_DB_URL=postgresql://postgres:postgres@shadow_db:5432/querysense_shadow
      - MYSQL_URL=mysql+mysqlconnector://root:mysql@mysql_db:3306/querysense_main
      - APP_DB_URL=postgresql://postgres:postgres@app_db:5432/querysense_app
      - REDIS_URL=redis://redis:6379
    depends_on:
      main_db:
        condition: service_healthy
      shadow_db:
        condition: service_healthy
      app_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --loop uvloop

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qs_celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MAIN_DB_URL=postgresql://postgres:postgres@main_db:5432/querysense_main
      - SHADOW_DB_URL=postgresql://postgres:postgres@shadow_db:5432/querysense_shadow
      - APP_DB_URL=postgresql://postgres:postgres@app_db:5432/querysense_app
      - REDIS_URL=redis://redis:6379
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qs_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MAIN_DB_URL=postgresql://postgres:postgres@main_db:5432/querysense_main
      - SHADOW_DB_URL=postgresql://postgres:postgres@shadow_db:5432/querysense_shadow
      - APP_DB_URL=postgresql://postgres:postgres@app_db:5432/querysense_app
      - REDIS_URL=redis://redis:6379
    depends_on:
      - backend
      - redis
      - celery_worker
    volumes:
      - ./backend:/app
    command: celery -A app.core.celery_app beat --loglevel=info

  nginx:
    image: nginx:alpine
    container_name: qs_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qs_frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: qs_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - backend

volumes:
  main_db_data:
  shadow_db_data:
  mysql_db_data:
  app_db_data:
  prometheus_data:
